<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="google" content="notranslate">
<title>RAN Team全員都開轟! 棒棒擊沉NPO!</title>

<style>
  body {
    font-family: "Noto Sans TC", system-ui;
    background: #f1f8e9;
    margin: 0;
    padding: 8px;
  }

  h1 {
    text-align: center;
    font-size: 20px;
    margin: 8px 0 12px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .card {
    position: relative;
    background: linear-gradient(135deg, #ffffff, #f9f9f9);
    border-radius: 14px;
    padding: 10px 8px 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,.12);
    font-size: 12px;
  }

  .card.captain-card {
    border: 2px solid #d32f2f;
  }

  /* 背號 */
  .number {
    position: absolute;
    top: -6px;
    left: -6px;
    background: #1976d2;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }

  /* 隊長標誌 */
  .captain {
    position: absolute;
    top: -14px;
    right: -10px;
    background: #d32f2f;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 6px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }

  .name {
    text-align: center;
    font-weight: 700;
    margin-bottom: 6px;
    font-size: 14px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .label {
    font-size: 12px;
  }

  .control {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .control button {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: none;
    background: #bbdefb;
    font-size: 16px;
    cursor: pointer;
  }

  .value {
    width: 22px;
    text-align: center;
    font-size: 13px;
  }

  .total {
    margin-top: 6px;
    text-align: center;
    background: #fff3cd;
    border-radius: 10px;
    font-size: 15px;
    font-weight: bold;
    padding: 6px;
  }
</style>
</head>

<body>

<h1>RAN Team全員都開轟! 棒棒擊沉NPO!</h1>

<div class="grid" id="grid"></div>

<script>
/* 球員與背號（依你指定） */
const players = [
  { name: "Aaron", number: 31 },
  { name: "FuShiung", number: 17 },
  { name: "Kevin", number: 21 },
  { name: "Charlie", number: 6 },
  { name: "Ray H", number: 90 },
  { name: "Ray C", number: 20 },
  { name: "Kelvin", number: 88 },
  { name: "Wallace", number: 15 },
  { name: "Ben", number: 9 },
  { name: "Denny", number: 2 },
  { name: "Wesley", number: 87 }
];

/* 規則定義 */
const events = [
  { name: "出局", self: 3, aaron: 0 },
  { name: "三振", self: 3, aaron: 0 },
  { name: "失誤", self: 1, aaron: 0 },
  { name: "保送", self: 0, aaron: 1 },
  { name: "一安", self: 0, aaron: 1 },
  { name: "二安", self: 0, aaron: 2 },
  { name: "三安", self: 0, aaron: 3 },
  { name: "全壘", self: 0, aaron: 4 },
  { name: "打點", self: 0, aaron: 1 }
];

const grid = document.getElementById("grid");

/* 建立卡片 */
players.forEach((p, pi) hooking => {
  const card = document.createElement("div");
  card.className = p.name === "Aaron" ? "card captain-card" : "card";

  const rows = events.map((e, ei) => `
    <div class="row">
      <div class="label">${e.name}</div>
      <div class="control">
        <button onclick="chg(${pi},${ei},-1)">➖</button>
        <div class="value" id="v-${pi}-${ei}">0</div>
        <button onclick="chg(${pi},${ei},1)">➕</button>
      </div>
    </div>
  `).join("");

  card.innerHTML = `
    <div class="number">#${p.number}</div>
    ${p.name === "Aaron" ? `<div class="captain">👑 隊長</div>` : ""}
    <div class="name">${p.name}</div>
    ${rows}
    <div class="total" id="t-${pi}">🍺 0 杯</div>
  `;

  grid.appendChild(card);
});

function chg(pi, ei, d) {
  const el = document.getElementById(`v-${pi}-${ei}`);
  let v = Number(el.textContent);
  v = Math.max(0, v + d);
  el.textContent = v;
  calc();
}

function calc() {
  let aaronExtra = 0;

  /* 全隊加在 Aaron 的杯數 */
  players.forEach((_, pi) => {
    events.forEach((e, ei) => {
      const v = Number(document.getElementById(`v-${pi}-${ei}`).textContent);
      aaronExtra += v * e.aaron;
    });
  });

  /* 更新每一張卡片 */
  players.forEach((p, pi) => {
    let selfDrink = 0;
    events.forEach((e, ei) => {
      const v = Number(document.getElementById(`v-${pi}-${ei}`).textContent);
      selfDrink += v * e.self;
    });

    const total = p.name === "Aaron"
      ? selfDrink + aaronExtra
      : selfDrink;

    document.getElementById(`t-${pi}`).textContent = `🍺 ${total} 杯`;
  });
}
</script>

</body>
</html>
