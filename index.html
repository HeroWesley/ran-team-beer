<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="google" content="notranslate">
<title>RAN Team全員都開轟! 棒棒擊沉NPO!</title>

<style>
  body {
    font-family: "Noto Sans TC", system-ui;
    background: #f1f8e9;
    margin: 0;
    padding: 8px;
  }

  h1 {
    text-align: center;
    font-size: 20px;
    margin: 8px 0 12px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .card {
    position: relative;
    background: linear-gradient(135deg, #ffffff, #f9f9f9);
    border-radius: 14px;
    padding: 12px 8px 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,.12);
    font-size: 12px;
  }

  .card.captain-card {
    border: 2px solid #d32f2f;
  }

  .number {
    position: absolute;
    top: -6px;
    left: -6px;
    background: #1976d2;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .captain {
    position: absolute;
    top: -14px;
    right: -10px;
    background: #d32f2f;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 6px;
    border-radius: 10px;
  }

  .name {
    text-align: center;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 2px;
  }

  .nickname {
    text-align: center;
    font-size: 11px;
    color: #666;
    margin-bottom: 6px;
    font-style: italic;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .control {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 32px;
  }

  .control button {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: #bbdefb;
    font-size: 16px;
    cursor: pointer;
  }

  .value {
    width: 22px;
    text-align: center;
    font-size: 14px;
    line-height: 32px;
  }

  .total {
    margin-top: 6px;
    text-align: center;
    background: #fff3cd;
    border-radius: 10px;
    font-size: 15px;
    font-weight: bold;
    padding: 6px;
  }

  /* 🎇 彩蛋字幕 */
  #easterEgg {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.55);
    z-index: 999;
    font-size: 26px;
    font-weight: 900;
    color: #ffeb3b;
    text-align: center;
  }

  #easterEgg.show {
    display: flex;
    animation: pop 1.2s ease;
  }

  @keyframes pop {
    0% { transform: scale(.5); opacity: 0; }
    60% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); }
  }
</style>
</head>

<body>

<h1>RAN Team全員都開轟! 棒棒擊沉NPO!</h1>
<div class="grid" id="grid"></div>

<div id="easterEgg">🍻 鴛鴦雙飛<br>王大哥陪你喝 🍻</div>

<script>
const players = [
  { name: "Aaron", number: 31, nickname: "幹話王" },
  { name: "FuShiung", number: 17, nickname: "雄董" },
  { name: "Kevin", number: 21, nickname: "黃領導" },
  { name: "Charlie", number: 6, nickname: "查哥" },
  { name: "Ray H", number: 90, nickname: "小鑫鑫" },
  { name: "Ray C", number: 20, nickname: "黃金游擊" },
  { name: "Kelvin", number: 88, nickname: "攝影大哥" },
  { name: "Wallace", number: 15, nickname: "瓦哥" },
  { name: "Ben", number: 9, nickname: "年輕人" },
  { name: "Denny", number: 2, nickname: "王大哥" },
  { name: "Wesley", number: 87, nickname: "衛斯理" },
  { name: "Benson", number: 86, nickname: "班森" }
];

const events = [
  { name: "一球出局", self: 3, aaron: 0 },
  { name: "兩球三振", self: 3, aaron: 0 },
  { name: "失誤", self: 1, aaron: 0 },
  { name: "保送", self: 0, aaron: 1 },
  { name: "一安", self: 0, aaron: 1 },
  { name: "二安", self: 0, aaron: 2 },
  { name: "三安", self: 0, aaron: 3 },
  { name: "全壘", self: 0, aaron: 4 },
  { name: "打點", self: 0, aaron: 1 }
];

const grid = document.getElementById("grid");
const egg = document.getElementById("easterEgg");
const bonus = {}; // 額外修正杯數用

players.forEach((p, pi) => {
  const card = document.createElement("div");
  card.className = p.name === "Aaron" ? "card captain-card" : "card";

  const rows = events.map((e, ei) => `
    <div class="row">
      <div>${e.name}</div>
      <div class="control">
        <button onclick="chg(${pi},${ei},-1)">➖</button>
        <div class="value" id="v-${pi}-${ei}">0</div>
        <button onclick="chg(${pi},${ei},1)">➕</button>
      </div>
    </div>
  `).join("");

  card.innerHTML = `
    <div class="number">#${p.number}</div>
    ${p.name === "Aaron" ? `<div class="captain">👑 隊長</div>` : ""}
    <div class="name">${p.name}</div>
    <div class="nickname">「${p.nickname}」</div>
    ${rows}
    <div class="total" id="t-${pi}">🍺 0 杯</div>
  `;
  grid.appendChild(card);
});

function showEgg() {
  egg.classList.add("show");
  setTimeout(() => egg.classList.remove("show"), 1200);
}

function chg(pi, ei, d) {
  const el = document.getElementById(`v-${pi}-${ei}`);
  const v = Number(el.textContent);
  const next = Math.max(0, v + d);
  el.textContent = next;

  // 🎁 彩蛋條件：Aaron + 全壘 + 增加
  if (players[pi].name === "Aaron" && events[ei].name === "全壘" && d === 1) {
    showEgg();
    bonus["Aaron"] = (bonus["Aaron"] || 0) - 2;
    bonus["Denny"] = (bonus["Denny"] || 0) + 2;
  }

  calc();
}

function calc() {
  let aaronExtra = 0;

  players.forEach((_, pi) => {
    events.forEach((e, ei) => {
      const v = Number(document.getElementById(`v-${pi}-${ei}`).textContent);
      aaronExtra += v * e.aaron;
    });
  });

  players.forEach((p, pi) => {
    let selfDrink = 0;
    events.forEach((e, ei) => {
      const v = Number(document.getElementById(`v-${pi}-${ei}`).textContent);
      selfDrink += v * e.self;
    });

    let total = p.name === "Aaron" ? selfDrink + aaronExtra : selfDrink;
    total += bonus[p.name] || 0;
    document.getElementById(`t-${pi}`).textContent = `🍺 ${total} 杯`;
  });
}
</script>

</body>
</html>
